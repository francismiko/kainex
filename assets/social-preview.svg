<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Grid line pattern -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff06" stroke-width="1"/>
    </pattern>
    <!-- Glow filter for logo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for candles -->
    <filter id="candleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Bottom fade gradient -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a0a0f" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Green candle gradient -->
    <linearGradient id="greenCandle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Red candle gradient -->
    <linearGradient id="redCandle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#6366f1"/>
      <stop offset="0.8" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <!-- MA line gradient -->
    <linearGradient id="maLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="0.85" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0a0f"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative corner accents -->
  <line x1="40" y1="40" x2="120" y2="40" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="40" y1="40" x2="40" y2="120" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1240" y1="40" x2="1160" y2="40" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="1240" y1="40" x2="1240" y2="120" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Horizontal grid lines for chart area -->
  <line x1="160" y1="230" x2="1120" y2="230" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="160" y1="290" x2="1120" y2="290" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="160" y1="350" x2="1120" y2="350" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="160" y1="410" x2="1120" y2="410" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="160" y1="470" x2="1120" y2="470" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- ===== K-line / Candlestick chart (center area) ===== -->
  <g filter="url(#candleGlow)">
    <!-- Candle 1: Green (bullish) -->
    <line x1="240" y1="370" x2="240" y2="440" stroke="#22c55e" stroke-width="2"/>
    <rect x="226" y="390" width="28" height="35" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 2: Red (bearish) -->
    <line x1="320" y1="350" x2="320" y2="430" stroke="#ef4444" stroke-width="2"/>
    <rect x="306" y="360" width="28" height="50" rx="2" fill="url(#redCandle)" opacity="0.9"/>

    <!-- Candle 3: Green (bullish, tall) -->
    <line x1="400" y1="300" x2="400" y2="420" stroke="#22c55e" stroke-width="2"/>
    <rect x="386" y="330" width="28" height="65" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 4: Green (bullish, small) -->
    <line x1="480" y1="280" x2="480" y2="370" stroke="#22c55e" stroke-width="2"/>
    <rect x="466" y="300" width="28" height="40" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 5: Red (bearish) -->
    <line x1="560" y1="270" x2="560" y2="380" stroke="#ef4444" stroke-width="2"/>
    <rect x="546" y="280" width="28" height="70" rx="2" fill="url(#redCandle)" opacity="0.9"/>

    <!-- Candle 6: Red (bearish, small) -->
    <line x1="640" y1="310" x2="640" y2="400" stroke="#ef4444" stroke-width="2"/>
    <rect x="626" y="320" width="28" height="45" rx="2" fill="url(#redCandle)" opacity="0.9"/>

    <!-- Candle 7: Green (bullish, strong recovery) -->
    <line x1="720" y1="260" x2="720" y2="390" stroke="#22c55e" stroke-width="2"/>
    <rect x="706" y="290" width="28" height="70" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 8: Green (bullish) -->
    <line x1="800" y1="240" x2="800" y2="340" stroke="#22c55e" stroke-width="2"/>
    <rect x="786" y="255" width="28" height="55" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 9: Red (bearish, small pullback) -->
    <line x1="880" y1="250" x2="880" y2="330" stroke="#ef4444" stroke-width="2"/>
    <rect x="866" y="260" width="28" height="40" rx="2" fill="url(#redCandle)" opacity="0.9"/>

    <!-- Candle 10: Green (bullish) -->
    <line x1="960" y1="220" x2="960" y2="310" stroke="#22c55e" stroke-width="2"/>
    <rect x="946" y="235" width="28" height="45" rx="2" fill="url(#greenCandle)" opacity="0.9"/>

    <!-- Candle 11: Green (bullish, new high) -->
    <line x1="1040" y1="200" x2="1040" y2="290" stroke="#22c55e" stroke-width="2"/>
    <rect x="1026" y="215" width="28" height="50" rx="2" fill="url(#greenCandle)" opacity="0.9"/>
  </g>

  <!-- Moving average line (smooth curve through candles) -->
  <path d="M 200,420 C 280,410 340,390 400,360 C 460,330 500,320 560,330 C 620,340 660,350 720,320 C 780,290 820,275 880,280 C 940,285 980,260 1080,240"
        fill="none" stroke="url(#maLine)" stroke-width="2" stroke-linecap="round"/>

  <!-- Volume bars (faint, at bottom of chart area) -->
  <g opacity="0.15">
    <rect x="230" y="460" width="20" height="25" rx="1" fill="#22c55e"/>
    <rect x="310" y="455" width="20" height="30" rx="1" fill="#ef4444"/>
    <rect x="390" y="440" width="20" height="45" rx="1" fill="#22c55e"/>
    <rect x="470" y="460" width="20" height="25" rx="1" fill="#22c55e"/>
    <rect x="550" y="445" width="20" height="40" rx="1" fill="#ef4444"/>
    <rect x="630" y="460" width="20" height="25" rx="1" fill="#ef4444"/>
    <rect x="710" y="435" width="20" height="50" rx="1" fill="#22c55e"/>
    <rect x="790" y="450" width="20" height="35" rx="1" fill="#22c55e"/>
    <rect x="870" y="465" width="20" height="20" rx="1" fill="#ef4444"/>
    <rect x="950" y="450" width="20" height="35" rx="1" fill="#22c55e"/>
    <rect x="1030" y="440" width="20" height="45" rx="1" fill="#22c55e"/>
  </g>

  <!-- Bottom fade overlay over chart -->
  <rect x="0" y="480" width="1280" height="160" fill="url(#bottomFade)"/>

  <!-- ===== Logo and text ===== -->
  <!-- Logo text -->
  <text x="80" y="110" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="56" font-weight="700" fill="#ffffff" filter="url(#glow)" letter-spacing="2">Kainex</text>

  <!-- Accent line under logo -->
  <rect x="80" y="125" width="200" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Subtitle -->
  <text x="80" y="165" font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="1">Open-source Multi-market</text>
  <text x="80" y="195" font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="1">Quantitative Trading Platform</text>

  <!-- ===== Tech stack tags (bottom) ===== -->
  <g transform="translate(80, 560)">
    <!-- React tag -->
    <rect x="0" y="0" width="90" height="32" rx="6" fill="#ffffff0a" stroke="#61dafb" stroke-opacity="0.4" stroke-width="1"/>
    <text x="45" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#61dafb" text-anchor="middle" font-weight="500">React</text>

    <!-- FastAPI tag -->
    <rect x="108" y="0" width="100" height="32" rx="6" fill="#ffffff0a" stroke="#009688" stroke-opacity="0.4" stroke-width="1"/>
    <text x="158" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#009688" text-anchor="middle" font-weight="500">FastAPI</text>

    <!-- NautilusTrader tag -->
    <rect x="226" y="0" width="150" height="32" rx="6" fill="#ffffff0a" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
    <text x="301" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#8b5cf6" text-anchor="middle" font-weight="500">NautilusTrader</text>

    <!-- DuckDB tag -->
    <rect x="394" y="0" width="100" height="32" rx="6" fill="#ffffff0a" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1"/>
    <text x="444" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="500">DuckDB</text>

    <!-- Python tag -->
    <rect x="512" y="0" width="100" height="32" rx="6" fill="#ffffff0a" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
    <text x="562" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="500">Python</text>

    <!-- TypeScript tag -->
    <rect x="630" y="0" width="120" height="32" rx="6" fill="#ffffff0a" stroke="#3178c6" stroke-opacity="0.4" stroke-width="1"/>
    <text x="690" y="21" font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif" font-size="13" fill="#3178c6" text-anchor="middle" font-weight="500">TypeScript</text>
  </g>

  <!-- Tagline at bottom right -->
  <text x="1200" y="580" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14" fill="#6366f1" text-anchor="end" opacity="0.6" letter-spacing="1">The edge you engineer.</text>
</svg>

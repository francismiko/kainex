<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Candlestick 1: bearish (red) -->
  <line x1="7" y1="6" x2="7" y2="26" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="5" y="10" width="4" height="10" rx="0.5" fill="#ef4444"/>
  <!-- Candlestick 2: bullish (green) -->
  <line x1="14" y1="8" x2="14" y2="28" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="12" y="14" width="4" height="10" rx="0.5" fill="#22c55e"/>
  <!-- Candlestick 3: bullish (green, tall) -->
  <line x1="21" y1="4" x2="21" y2="24" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="19" y="8" width="4" height="10" rx="0.5" fill="#22c55e"/>
  <!-- Candlestick 4: bearish (red) -->
  <line x1="28" y1="6" x2="28" y2="22" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="26" y="9" width="4" height="8" rx="0.5" fill="#ef4444"/>
</svg>
